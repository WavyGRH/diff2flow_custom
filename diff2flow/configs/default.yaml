# Diff2Flow Default Configuration
# Override any setting via CLI: python train.py model=sd21_diff2flow data.batch_size=8

# --- Model ---
model:
  model_id: "stabilityai/stable-diffusion-2-1"
  in_channels: 4
  parameterization: "v"   # v-prediction (SD 2.1 default)
  use_fp16: true

# --- Training ---
training:
  objective: "diff2flow"  # Options: diffusion, fm, diff2flow
  learning_rate: 1.0e-5
  num_iterations: 20000
  batch_size: 32
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  lr_scheduler: "cosine"
  warmup_steps: 500
  save_every: 2000
  log_every: 100
  output_dir: "outputs"

# --- LoRA ---
lora:
  enabled: false
  rank: "base"            # "base" (128, ~222M params) or "small" (64, ~62M params)
  alpha: 1.0
  dropout: 0.0

# --- Data ---
data:
  type: "dummy"           # dummy, text_image, depth, reflow
  root_dir: null
  batch_size: 32
  num_workers: 4
  resolution: [512, 512]

# --- Sampling ---
sampling:
  num_steps: 25
  guidance_scale: 7.5
  use_diff2flow: true
